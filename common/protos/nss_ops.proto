syntax = "proto3";

package nss_ops;

import "google/protobuf/empty.proto";

enum Command {
  Invalid = 0;
  Handshake = 1;  // Reserved for RPC handshake
  // Application-specific commands start from 16
  PutInode = 16;
  GetInode = 17;
  ListInodes = 18;
  DeleteInode = 19;
  CreateRootInode = 20;
  DeleteRootInode = 21;
  Rename = 22;
  PutInodeCas = 23;
}

// PutInode
message PutInodeRequest {
  string root_blob_name = 1;
  string key = 2;
  bytes value = 3;
}

message PutInodeResponse {
  oneof result {
    bytes ok = 1;
    google.protobuf.Empty err_no_such_root_blob = 2;
    string err_other = 3;
  }
}

// PutInodeCas: byte-equality compare-and-swap on the stored value.
//
// expected_old_value carries the bytes the caller believes are currently
// stored at `key`. The server proceeds with the put only when the current
// value matches byte-for-byte. The empty string requires that no live
// entry exists for `key`.
message PutInodeCasRequest {
  string root_blob_name = 1;
  string key = 2;
  bytes value = 3;
  bytes expected_old_value = 4;
}

message PutInodeCasResponse {
  oneof result {
    bytes ok = 1;        // success: returns previous value bytes (may be empty)
    bytes conflict = 2;  // CAS failure: returns currently stored value bytes
    string err = 3;
  }
}

// GetInode
message GetInodeRequest {
  string root_blob_name = 1;
  string key = 2;
}

message GetInodeResponse {
  oneof result {
    bytes ok = 1;
    google.protobuf.Empty err_not_found = 2;
    google.protobuf.Empty err_no_such_root_blob = 3;
    string err_other = 4;
  }
}

// ListInodes
message ListInodesRequest {
  string root_blob_name = 1;
  uint32 max_keys = 2;
  string prefix = 3;
  string delimiter = 4;
  string start_after = 5;
  bool skip_mpu_parts = 6;
}

message ListInodesResponse {
  oneof result {
    Inodes ok = 1;
    google.protobuf.Empty err_no_such_root_blob = 2;
    string err_other = 3;
  }

  message Inode {
    string key = 1;
    bytes inode = 2;
  }

  message Inodes {
    repeated Inode inodes = 1;
    bool has_more = 2;
  }
}

// DeleteInode
message DeleteInodeRequest {
  string root_blob_name = 1;
  string key = 2;
}

message DeleteInodeResponse {
  oneof result {
    bytes ok = 1;
    google.protobuf.Empty err_not_found = 2;
    google.protobuf.Empty err_already_deleted = 3;
    google.protobuf.Empty err_no_such_root_blob = 4;
    string err_other = 5;
  }
}

// CreateRootInode
message CreateRootInodeRequest {
  string bucket = 1;
  reserved 2;
}

message CreateRootInodeResponse {
  message Blobs {
    string root_blob_name = 1;
    reserved 2;
  }

  oneof result {
    Blobs ok = 1;
    string err = 2;
  }
}

// DeleteRootInode
message DeleteRootInodeRequest {
  string root_blob_name = 1;
}

message DeleteRootInodeResponse {
  oneof result {
    string ok = 1;
    google.protobuf.Empty err_not_empty = 2;
    string err_other = 3;
  }
}

// Rename
message RenameRequest {
  string root_blob_name = 1;
  string src_path = 2;
  string dst_path = 3;
  // Only honored for rename-object (paths ending with \0). When true and the
  // destination already exists, the rename overwrites it and the old dst value
  // is returned in RenameResponse.ok.
  bool force_overwrite = 4;
}

message RenameResponse {
  oneof result {
    bytes ok = 1;
    google.protobuf.Empty err_src_nonexisted = 2;
    google.protobuf.Empty err_dst_existed = 3;
    google.protobuf.Empty err_no_such_root_blob = 4;
    string err_other = 5;
  }
}
